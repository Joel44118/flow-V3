<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flow AI">
  <meta name="theme-color" content="#38bdf8">
  <title>Flow AI</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="shortcut icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <canvas id="orb-canvas"></canvas>
  <div id="agent-badge" style="display:none"></div>

  <div id="top-bar">
    <div id="flow-logo">FLOW <span id="vtag">V3</span></div>
    <div id="wake-indicator">Say <em>"Hey Flow"</em></div>
    <div id="status-wrap"><span id="status-dot"></span><span id="status-label">ONLINE</span></div>
    <div id="win-controls" style="display:none">
      <span id="build-stamp" style="font-size:10px;color:rgba(56,189,248,0.5);margin-right:10px;font-family:monospace;"></span>
      <button id="win-min"   title="Minimize" aria-label="Minimize"></button>
      <button id="win-max"   title="Maximize" aria-label="Maximize"></button>
      <button id="win-close" title="Close"    aria-label="Close"></button>
    </div>
  </div>

  <div id="level-bar-wrap">
    <div id="level-brain-circle" title="Flow's level">
      <svg viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.5 2a3.5 3.5 0 0 0-3.5 3.5v.6A3.5 3.5 0 0 0 4 9.3v1.2a3.2 3.2 0 0 0-1.5 2.7c0 1 .5 1.9 1.3 2.5-.2.4-.3.9-.3 1.3a3 3 0 0 0 3 3c.3 0 .6 0 .9-.1A3 3 0 0 0 10 22a3 3 0 0 0 3-3v-.1"/>
        <path d="M14.5 2a3.5 3.5 0 0 1 3.5 3.5v.6A3.5 3.5 0 0 1 20 9.3v1.2a3.2 3.2 0 0 1 1.5 2.7c0 1-.5 1.9-1.3 2.5.2.4.3.9.3 1.3a3 3 0 0 1-3 3c-.3 0-.6 0-.9-.1A3 3 0 0 1 14 22a3 3 0 0 1-3-3v-14a3 3 0 0 1 3.5-3z"/>
      </svg>
    </div>
    <div id="level-bar-col">
      <span id="level-bar-label">LV. <span id="level-bar-num">0</span></span>
      <div id="level-bar-track">
        <div id="level-bar-fill"></div>
        <span id="level-bar-xp"></span>
      </div>
    </div>
  </div>
  <div id="level-up-card"></div>

  <script>
    // Only present in the Electron desktop app — a browser tab has no
    // __flowElectron bridge, so this whole block silently does nothing there.
    if (window.__flowElectron) {
      const wc = document.getElementById('win-controls');
      wc.style.display = 'flex';
      document.getElementById('win-min').onclick   = () => window.__flowElectron.minimize();
      document.getElementById('win-max').onclick   = () => window.__flowElectron.maximize();
      document.getElementById('win-close').onclick = () => window.__flowElectron.close();

      // Shows exactly which build is running — the commit hash + when it
      // was built — so there's never any doubt about whether a fresh
      // download actually replaced the old one.
      window.__flowElectron.getBuildInfo?.().then((info) => {
        const el = document.getElementById('build-stamp');
        if (el && info) el.textContent = `${info.commit} · ${info.builtAt}`;
      });
    }
  </script>

  <div id="alarm-panel"><div id="alarm-list"></div></div>

  <div class="msg-col" id="col-left"></div>
  <div class="msg-col" id="col-right"></div>

  <div id="notepad-box">
    <div id="notepad-header">
      <span id="notepad-title">⚡ FLOW NOTEPAD</span>
      <div id="notepad-btns">
        <button class="note-btn" id="btn-clear">CLEAR</button>
        <button class="note-btn" id="btn-export">EXPORT</button>
        <button class="note-btn" id="btn-close">✕</button>
      </div>
    </div>
    <textarea id="notepad-text" placeholder="Start typing or speak..."></textarea>
  </div>

  <div id="brain-btn" title="Brain Menu">🧠</div>
  <div id="brain-menu">
    <button class="brain-action" id="brain-export">Export Brain</button>
    <button class="brain-action" id="brain-import">Import Brain</button>
    <button class="brain-action" id="brain-clear">Clear Memory</button>
    <button class="brain-action" id="brain-resetpin">Reset PIN</button>
    <button class="brain-action" id="brain-enrollface">Set Up Face Unlock</button>
    <button class="brain-action" id="brain-resetface">Remove Face Unlock</button>
    <input type="file" id="brain-file" accept=".json">
  </div>

  <!-- Input bar -->
  <div class="input-panel">
    <div id="vision-popup-wrap">
      <button id="vision-toggle-btn" title="Vision tools">👁</button>
      <div id="vision-popup">
        <button class="vpop-btn" id="btn-camera" title="Camera">📷<span>Camera</span></button>
        <button class="vpop-btn" id="btn-screen" title="Share Screen">🖥️<span>Screen</span></button>
        <button class="vpop-btn" id="btn-yolo"   title="Object Detection">🔍<span>YOLO</span></button>
        <button class="vpop-btn" id="btn-face"   title="Learn My Face">👤<span>Face</span></button>
      </div>
    </div>

    <button id="file-btn" title="Upload file">📎</button>
    <input type="file" id="file-input" multiple
      accept="image/*,video/*,audio/*,.pdf,.txt,.md,.js,.ts,.jsx,.tsx,.py,.html,.css,.json,.csv,.xml,.yaml,.yml,.sh,.log,.sql,.doc,.docx"
      style="display:none">

    <div id="input-placeholder">
      <span>Ask me anything...</span>
      <span>/ triggers skills</span>
      <span>What's on your mind, Boss?</span>
      <span>Search, code, create...</span>
    </div>
    <div id="user-input" contenteditable="true" role="textbox" aria-multiline="true" spellcheck="false"></div>

    <button id="mic-btn">🎤</button>
    <button id="send-btn">➤</button>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    // Register PWA service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
