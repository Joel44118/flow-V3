name: Build Flow Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'flow-electron/**'
      - '.github/workflows/build-electron.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: flow-electron
        run: npm install

      - name: Install robotjs (best effort)
        working-directory: flow-electron
        run: npm install @jitsi/robotjs --ignore-scripts
        continue-on-error: true

      - name: Build exe
        working-directory: flow-electron
        run: npm run build-win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: Flow-AI-Windows-exe
          path: flow-electron/dist/**/*.exe
          if-no-files-found: error
          retention-days: 30
