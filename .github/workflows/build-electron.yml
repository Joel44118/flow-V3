name: Build Flow Desktop App
on:
  push:
    branches: [main]
    paths:
      - 'flow-electron/**'
      - '.github/workflows/build-electron.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Stamps this exact build with the commit SHA + a human-readable
      # timestamp. This is what lets you actually VERIFY on launch that
      # you're running the build you just triggered — not a stale cached
      # artifact from an earlier run. Written to a JSON file that main.js
      # reads and shows in the window title + an About panel.
      - name: Stamp build version
        working-directory: flow-electron
        shell: bash
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          echo "{\"commit\":\"$SHORT_SHA\",\"builtAt\":\"$BUILD_TIME\",\"fullSha\":\"${{ github.sha }}\"}" > build-info.json
          cat build-info.json
      - name: Install dependencies
        working-directory: flow-electron
        run: npm install --ignore-scripts
      # REAL FIX for "active-win not found — Sentinel disabled" on every
      # installed build: active-win ships native bindings that need a
      # rebuild step to work correctly against Electron's Node ABI (not
      # the system Node ABI actions/setup-node provides). The plain
      # `npm install --ignore-scripts` above deliberately skips ALL
      # postinstall scripts for security — correct policy for the rest
      # of the dependency tree, but it silently left active-win's native
      # module unrebuilt every single time, which is exactly why
      # Sentinel's `require('active-win')` was failing at runtime with
      # no visible error until this session's testing surfaced it.
      # `electron-builder install-app-deps` is a targeted, known-safe
      # rebuild command (not arbitrary postinstall scripts from
      # untrusted packages) — it doesn't reopen the ignore-scripts
      # security posture, it specifically rebuilds native deps against
      # the Electron version already pinned in devDependencies.
      - name: Rebuild native dependencies for Electron
        working-directory: flow-electron
        run: npx electron-builder install-app-deps
      - name: Build installer
        working-directory: flow-electron
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TEMPORARY DEBUG FLAG — added to diagnose the "heartbeat.js
          # missing from app.asar" issue. This makes electron-builder log
          # detailed file-collection output (every file considered,
          # matched, and excluded) directly into this CI step's log, so
          # Joel can confirm from the Actions tab — for free, no download
          # needed — whether heartbeat.js and memory-store.js are being
          # picked up by the `files` glob patterns before installing
          # anything. Safe to remove once confirmed working.
          DEBUG: electron-builder
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          # Artifact name includes the short SHA so two different builds
          # never look identical in the Actions/Artifacts list — you can
          # tell at a glance which one is newest without opening either.
          name: Flow-AI-Installer-${{ github.sha }}
          path: flow-electron/dist/*.exe
          if-no-files-found: warn
          retention-days: 30
