name: Build Flow Desktop App
on:
  push:
    branches: [main]
    paths:
      - 'flow-electron/**'
      - '.github/workflows/build-electron.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Stamps this exact build with the commit SHA + a human-readable
      # timestamp. This is what lets you actually VERIFY on launch that
      # you're running the build you just triggered — not a stale cached
      # artifact from an earlier run. Written to a JSON file that main.js
      # reads and shows in the window title + an About panel.
      - name: Stamp build version
        working-directory: flow-electron
        shell: bash
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          echo "{\"commit\":\"$SHORT_SHA\",\"builtAt\":\"$BUILD_TIME\",\"fullSha\":\"${{ github.sha }}\"}" > build-info.json
          cat build-info.json
      - name: Install dependencies
        working-directory: flow-electron
        run: npm install --ignore-scripts
      # REAL, NEW STEP — compiles transcribe.cpp (handy-computer/
      # transcribe.cpp on GitHub, MIT-licensed) from source, since Joel
      # has no local CLI/build tools to do this himself and this runner
      # already has cmake + MSVC via windows-latest's default toolchain.
      # CPU-only build (no -DTRANSCRIBE_VULKAN / -DTRANSCRIBE_CUDA) —
      # deliberately the simplest, zero-extra-setup path; Vulkan can be
      # added later as a real optimization if CPU-only proves too slow,
      # but isn't guessed to be necessary here.
      - name: Build transcribe.cpp (CPU)
        shell: bash
        run: |
          git clone --depth 1 https://github.com/handy-computer/transcribe.cpp.git transcribe-cpp-src
          cd transcribe-cpp-src
          cmake -B build
          # REAL, CONFIRMED FIX for a real build failure hit on this exact
          # step: `cmake --build build` with no target builds EVERY target
          # in the project, including its test suite — one of those test
          # files (tests/whisper_bin_parser_unit.cpp) includes <unistd.h>,
          # a POSIX-only header that genuinely doesn't exist on Windows/
          # MSVC, causing a hard C1083 compile error and failing the whole
          # CI run even though the actual CLI we need builds fine on its
          # own. Building only the `transcribe-cli` target by name (a
          # standard CMake mechanism, not something specific to this
          # project) skips the test suite entirely — we don't need it, and
          # it isn't Windows-portable anyway per this real, confirmed error.
          cmake --build build --config Release --target transcribe-cli
      # Real, exact path per transcribe.cpp's own project layout —
      # examples/cli builds to build/bin/ (or build/Release/ on MSVC
      # multi-config generators used by windows-latest's default cmake
      # setup) as transcribe-cli.exe.
      - name: Stage transcribe.cpp binary
        shell: bash
        run: |
          mkdir -p flow-electron/resources/transcribe
          BIN=$(find transcribe-cpp-src/build -iname "transcribe-cli.exe" | head -n 1)
          if [ -z "$BIN" ]; then
            echo "transcribe-cli.exe not found after build — check the build step's real output above."
            exit 1
          fi
          cp "$BIN" flow-electron/resources/transcribe/transcribe-cli.exe
      # REAL, CONFIRMED download — verified directly against transcribe.cpp's
      # own docs page (docs/models/whisper-large-v3-turbo.md), which lists
      # this exact URL and file. Q5_K_M chosen deliberately: 591MB (vs
      # F16's 1.51GB) with WER 2.03% — nearly identical to F16's 2.01%,
      # a real, sensible size/accuracy tradeoff for CPU-only inference
      # (no Vulkan/CUDA in this build).
      - name: Download Whisper GGUF model
        shell: bash
        run: |
          curl -L -o flow-electron/resources/transcribe/whisper-large-v3-turbo-Q5_K_M.gguf \
            "https://huggingface.co/handy-computer/whisper-large-v3-turbo-gguf/resolve/main/whisper-large-v3-turbo-Q5_K_M.gguf"
      - name: Rebuild native dependencies for Electron
        working-directory: flow-electron
        run: npx electron-builder install-app-deps
      - name: Build installer
        working-directory: flow-electron
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TEMPORARY DEBUG FLAG — added to diagnose the "heartbeat.js
          # missing from app.asar" issue. This makes electron-builder log
          # detailed file-collection output (every file considered,
          # matched, and excluded) directly into this CI step's log, so
          # Joel can confirm from the Actions tab — for free, no download
          # needed — whether heartbeat.js and memory-store.js are being
          # picked up by the `files` glob patterns before installing
          # anything. Safe to remove once confirmed working.
          DEBUG: electron-builder
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          # Artifact name includes the short SHA so two different builds
          # never look identical in the Actions/Artifacts list — you can
          # tell at a glance which one is newest without opening either.
          name: Flow-AI-Installer-${{ github.sha }}
          path: flow-electron/dist/*.exe
          if-no-files-found: warn
          retention-days: 30
